<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="keywords" content="chips packet in faculty, ">
    <meta name="description" content="fdgdg gdfgdfgd">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleStore - Buy Products Online</title>
    <!-- Bootstrap + Icons + jQuery -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f5;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .navbar {
            background: #2874f0;
            color: white;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .product-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            transition: transform 0.2s;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .product-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            background: #f0f0f0;
        }
        .price {
            color: #388e3c;
            font-size: 1.3rem;
            font-weight: bold;
        }
        .old-price {
            text-decoration: line-through;
            color: #999;
            font-size: 0.9rem;
            margin-left: 8px;
        }
        .cart-badge {
            background: #ff9f00;
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 5px;
        }
        .cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 380px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.2);
            transition: 0.3s;
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }
        .cart-sidebar.open {
            right: 0;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 999;
        }
        .overlay.show {
            display: block;
        }
        .cart-item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }
        .toast-notify {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            z-index: 1100;
            animation: slideIn 0.3s;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .btn-buy {
            background: #fb641b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn-cart {
            background: #ff9f00;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
        }
        footer {
            background: #172337;
            color: white;
            padding: 20px;
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center w-100">
            <h3 class="mb-0">
                <i class="fas fa-store me-2"></i>
                SimpleStore
            </h3>
            <div class="d-flex align-items-center">
                <i class="fas fa-shopping-cart fa-2x" style="cursor: pointer;" onclick="toggleCart()"></i>
                <span class="cart-badge" id="cartCount">0</span>
            </div>
        </div>
    </div>
</div>

<!-- Products Section -->
<div class="container mt-4">
    <div class="row" id="productsContainer">
        <!-- Products will be loaded here -->
    </div>
</div>

<!-- Cart Sidebar -->
<div class="overlay" id="overlay" onclick="toggleCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="fas fa-shopping-cart"></i> Your Cart</h4>
        <button class="btn-close" onclick="toggleCart()"></button>
    </div>
    <div id="cartItems">
        <p class="text-muted text-center">Cart is empty</p>
    </div>
    <div id="cartTotal" class="mt-3" style="display: none;">
        <hr>
        <h5>Total: ₹<span id="totalAmount">0</span></h5>
        <button class="btn-buy w-100 mt-2" onclick="checkout()">
            <i class="fas fa-credit-card"></i> Checkout
        </button>
    </div>
</div>

<!-- Toast Message -->
<div class="toast-notify" id="toastMsg">
    <i class="fas fa-check-circle"></i> <span id="toastText">Added to cart!</span>
</div>

<footer>
    <p>&copy; 2024 SimpleStore - Your One Stop Shop | All Rights Reserved</p>
</footer>

<script>
    // Products Data
    const products = [
        {
            id: 1,
            name: "Apple iPhone 15",
            price: 79999,
            oldPrice: 89999,
            image: "https://via.placeholder.com/300x200/2874f0/white?text=iPhone+15",
            description: "Latest iPhone with A16 chip"
        },
        {
            id: 2,
            name: "Samsung Galaxy S24",
            price: 69999,
            oldPrice: 79999,
            image: "https://via.placeholder.com/300x200/ff9f00/white?text=Galaxy+S24",
            description: "Premium Android smartphone"
        },
        {
            id: 3,
            name: "Sony Headphones",
            price: 2999,
            oldPrice: 4999,
            image: "https://via.placeholder.com/300x200/4caf50/white?text=Headphones",
            description: "Noise cancellation wireless"
        },
        {
            id: 4,
            name: "Smart Watch",
            price: 3999,
            oldPrice: 7999,
            image: "https://via.placeholder.com/300x200/ff5722/white?text=Smart+Watch",
            description: "Fitness tracker, heart rate"
        },
        {
            id: 5,
            name: "Laptop Bag",
            price: 1299,
            oldPrice: 2499,
            image: "https://via.placeholder.com/300x200/9c27b0/white?text=Laptop+Bag",
            description: "Waterproof, 15.6 inch"
        },
        {
            id: 6,
            name: "Wireless Mouse",
            price: 599,
            oldPrice: 1299,
            image: "https://via.placeholder.com/300x200/607d8b/white?text=Wireless+Mouse",
            description: "Silent click, ergonomic"
        }
    ];

    // Cart array
    let cart = [];

    // Load products on page
    function loadProducts() {
        let html = '';
        products.forEach(product => {
            html += `
                <div class="col-md-4 col-sm-6 mb-4">
                    <div class="product-card">
                        <img src="${product.image}" class="product-img" alt="${product.name}">
                        <div class="mt-3">
                            <h5>${product.name}</h5>
                            <p class="text-muted small">${product.description}</p>
                            <div>
                                <span class="price">₹${product.price.toLocaleString()}</span>
                                <span class="old-price">₹${product.oldPrice.toLocaleString()}</span>
                            </div>
                            <div class="mt-3">
                                <button class="btn-cart" onclick="addToCart(${product.id})">
                                    <i class="fas fa-cart-plus"></i> Add to Cart
                                </button>
                                <button class="btn-buy ms-2" onclick="buyNow(${product.id})">
                                    Buy Now
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
        $('#productsContainer').html(html);
    }

    // Add to cart function
    function addToCart(productId) {
        let product = products.find(p => p.id === productId);
        let existingItem = cart.find(item => item.id === productId);
        
        if (existingItem) {
            existingItem.quantity++;
        } else {
            cart.push({
                id: product.id,
                name: product.name,
                price: product.price,
                quantity: 1,
                image: product.image
            });
        }
        
        updateCart();
        showToast(`${product.name} added to cart!`);
    }

    // Buy now function
    function buyNow(productId) {
        let product = products.find(p => p.id === productId);
        cart = [{
            id: product.id,
            name: product.name,
            price: product.price,
            quantity: 1,
            image: product.image
        }];
        updateCart();
        toggleCart();
        showToast(`Proceed to checkout for ${product.name}`);
    }

    // Update cart display
    function updateCart() {
        // Update cart count
        let totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        $('#cartCount').text(totalItems);
        
        // Update cart items HTML
        if (cart.length === 0) {
            $('#cartItems').html('<p class="text-muted text-center">Cart is empty</p>');
            $('#cartTotal').hide();
            return;
        }
        
        let cartHtml = '';
        let total = 0;
        
        cart.forEach((item, index) => {
            let itemTotal = item.price * item.quantity;
            total += itemTotal;
            cartHtml += `
                <div class="cart-item">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h6>${item.name}</h6>
                            <small>₹${item.price.toLocaleString()} x ${item.quantity}</small>
                        </div>
                        <div>
                            <strong>₹${itemTotal.toLocaleString()}</strong>
                            <button class="btn btn-sm btn-danger ms-2" onclick="removeFromCart(${index})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mt-2">
                        <button class="btn btn-sm btn-outline-secondary" onclick="updateQuantity(${index}, -1)">-</button>
                        <span class="mx-2">${item.quantity}</span>
                        <button class="btn btn-sm btn-outline-secondary" onclick="updateQuantity(${index}, 1)">+</button>
                    </div>
                </div>
            `;
        });
        
        $('#cartItems').html(cartHtml);
        $('#totalAmount').text(total.toLocaleString());
        $('#cartTotal').show();
    }

    // Update quantity
    function updateQuantity(index, change) {
        let newQuantity = cart[index].quantity + change;
        if (newQuantity <= 0) {
            cart.splice(index, 1);
        } else {
            cart[index].quantity = newQuantity;
        }
        updateCart();
    }

    // Remove from cart
    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCart();
        showToast('Item removed from cart');
    }

    // Checkout function
    function checkout() {
        if (cart.length === 0) {
            showToast('Cart is empty!', 'error');
            return;
        }
        
        let total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        let orderId = 'ORD' + Date.now();
        
        // Show order summary
        let message = `🎉 Order Placed Successfully!\nOrder ID: ${orderId}\nTotal: ₹${total.toLocaleString()}\nItems: ${cart.length}\nThank you for shopping!`;
        alert(message);
        
        // Clear cart
        cart = [];
        updateCart();
        toggleCart();
        showToast('Order placed successfully!', 'success');
    }

    // Toggle cart sidebar
    function toggleCart() {
        $('#cartSidebar').toggleClass('open');
        $('#overlay').toggleClass('show');
    }

    // Show toast notification
    function showToast(message, type = 'success') {
        let toast = $('#toastMsg');
        let bgColor = type === 'success' ? '#4caf50' : '#f44336';
        toast.css('background', bgColor);
        $('#toastText').text(message);
        toast.fadeIn(300);
        setTimeout(() => {
            toast.fadeOut(300);
        }, 2000);
    }

    // Initialize
    $(document).ready(function() {
        loadProducts();
        
        // Close cart on escape key
        $(document).keydown(function(e) {
            if (e.key === 'Escape') {
                toggleCart();
            }
        });
    });
</script>
</body>
</html>
